<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWELLS - Timeless Elegance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --gold-dark: #B8860B;
            --bg-dark: #050505;
            --bg-darker: #020202;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }
        
        /* Scroll container for GSAP */
        .scroll-container {
            height: 600vh;
            position: relative;
        }
        
        /* Fixed canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }
        
        /* Overlay content */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Brand text */
        .brand-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
        }
        
        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 300;
            letter-spacing: 0.4em;
            color: white;
            text-shadow: 
                0 0 60px rgba(212, 175, 55, 0.4),
                0 0 120px rgba(212, 175, 55, 0.2),
                0 0 180px rgba(212, 175, 55, 0.1);
        }
        
        .brand-tagline {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            letter-spacing: 1.2em;
            color: var(--gold);
            margin-top: 1.5rem;
            text-transform: uppercase;
            font-weight: 300;
        }
        
        /* Navigation */
        .nav-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }
        
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            color: white;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 3rem;
        }
        
        .nav-link {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.5s ease;
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.5s ease;
        }
        
        .nav-link:hover {
            color: var(--gold);
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        .scroll-indicator.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        
        .scroll-text {
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
        }
        
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
            50% { opacity: 1; transform: scaleY(1); }
        }
        
        /* Progress bar */
        .progress-bar {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .progress-bar.visible {
            opacity: 1;
        }
        
        .progress-track {
            width: 2px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }
        
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--gold);
            transition: height 0.1s ease;
        }
        
        .progress-text {
            font-size: 0.5rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.3);
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        
        /* Loading screen */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: opacity 1s ease, visibility 1s ease;
        }
        
        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            position: relative;
            animation: loaderRotate 3s linear infinite;
        }
        
        .loader-ring::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid transparent;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: loaderSpin 1.5s linear infinite;
        }
        
        @keyframes loaderRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes loaderSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            font-size: 0.7rem;
            letter-spacing: 0.8em;
            color: var(--gold);
            text-transform: uppercase;
        }
        
        /* Product section */
        .product-section {
            position: relative;
            z-index: 50;
            background: var(--bg-dark);
            padding: 8rem 4rem;
            min-height: 100vh;
            opacity: 0;
        }
        
        .product-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .product-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 1rem;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            transition: all 0.5s ease;
        }
        
        .product-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-8px);
        }
        
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        
        .product-name {
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }
        
        .product-price {
            font-size: 0.8rem;
            color: var(--gold);
        }
        
        @media (max-width: 768px) {
            .nav-container {
                padding: 1.5rem 2rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .brand-name {
                letter-spacing: 0.2em;
            }
            
            .progress-bar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">JWELLS</div>
    </div>

    <!-- Fixed Canvas -->
    <div id="canvas-container"></div>
    
    <!-- Navigation -->
    <nav class="nav-container" id="nav">
        <a href="#" class="nav-logo">JWELLS</a>
        <div class="nav-links">
            <a href="#home" class="nav-link">Home</a>
            <a href="#collections" class="nav-link">Collections</a>
            <a href="#rings" class="nav-link">Rings</a>
            <a href="#contact" class="nav-link">Contact</a>
        </div>
    </nav>
    
    <!-- Brand Text -->
    <div class="brand-container" id="brand">
        <div class="brand-name">JWELLS</div>
        <div class="brand-tagline">Crafted in Gold</div>
    </div>
    
    <!-- Scroll Indicator -->
    <div class="scroll-indicator" id="scroll-indicator">
        <div class="scroll-line"></div>
        <div class="scroll-text">Scroll to Explore</div>
    </div>
    
    <!-- Progress Bar -->
    <div class="progress-bar" id="progress-bar">
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0%</div>
    </div>
    
    <!-- Overlay -->
    <div class="overlay"></div>
    
    <!-- Scroll Container -->
    <div class="scroll-container" id="scroll-container"></div>
    
    <!-- Product Section -->
    <section class="product-section" id="collections">
        <div class="product-header">
            <h2 class="product-title">The Collection</h2>
            <p style="color: rgba(255,255,255,0.4);">Timeless pieces crafted for eternity</p>
        </div>
        <div class="product-grid">
            <div class="product-card">
                <img src="/images/ring.png" alt="Ring" class="product-image">
                <h3 class="product-name">AURELIUS NOIR</h3>
                <p class="product-price">€ 48,000</p>
            </div>
            <div class="product-card">
                <img src="/images/necklace.png" alt="Necklace" class="product-image">
                <h3 class="product-name">SOLSTICE CROWN</h3>
                <p class="product-price">€ 72,000</p>
            </div>
            <div class="product-card">
                <img src="/images/earrings.png" alt="Earrings" class="product-image">
                <h3 class="product-name">CELESTE</h3>
                <p class="product-price">€ 36,000</p>
            </div>
            <div class="product-card">
                <img src="/images/bracelet.png" alt="Bracelet" class="product-image">
                <h3 class="product-name">ETERNAL BAND</h3>
                <p class="product-price">€ 54,000</p>
            </div>
        </div>
    </section>

    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Main Script -->
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            particleCount: 20000,
            tunnelRadius: 15,
            tunnelLength: 150,
            ringRadius: 3,
            ringTube: 0.4,
            colors: {
                gold: 0xD4AF37,
                goldLight: 0xFFD700,
                goldDark: 0xB8860B,
                background: 0x050505
            }
        };
        
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let scene, camera, renderer, composer;
        let particles, ring;
        let clock = new THREE.Clock();
        let scrollProgress = 0;
        
        // DOM Elements
        const container = document.getElementById('canvas-container');
        const loader = document.getElementById('loader');
        const brandContainer = document.getElementById('brand');
        const scrollIndicator = document.getElementById('scroll-indicator');
        const navContainer = document.getElementById('nav');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        
        // ============================================
        // PARTICLE SHADER MATERIAL
        // ============================================
        const particleVertexShader = `
            uniform float uTime;
            uniform float uScrollProgress;
            uniform float uTornadoIntensity;
            uniform float uAssemblyProgress;
            
            attribute float aSize;
            attribute float aOffset;
            attribute float aSpeed;
            attribute vec3 aRingPosition;
            
            varying float vAlpha;
            varying float vDistance;
            varying float vAssembly;
            
            #define PI 3.14159265359
            
            void main() {
                vec3 pos = position;
                
                // Calculate spiral motion
                float zOffset = pos.z;
                float spiralAngle = zOffset * 0.02 + uTime * 0.3;
                
                // Tornado effect at start
                float tornadoFactor = uTornadoIntensity * (1.0 - smoothstep(0.0, 50.0, zOffset + 75.0));
                
                float radius = length(pos.xy);
                float angle = atan(pos.y, pos.x);
                
                // Add spiral rotation
                angle += spiralAngle + aOffset * PI * 2.0;
                
                // Pull toward center for tornado
                float pullCenter = tornadoFactor * 3.0;
                radius = mix(radius, 1.5, tornadoFactor * 0.7);
                
                pos.x = cos(angle) * radius;
                pos.y = sin(angle) * radius;
                
                // Vertical wave motion
                float verticalWave = sin(uTime * aSpeed * 0.4 + aOffset * PI * 2.0) * (0.3 + tornadoFactor * 2.0);
                pos.z += verticalWave;
                
                // Twist distortion
                float twist = sin(zOffset * 0.05 + uTime * 0.2) * 4.0;
                pos.x += twist * 0.1;
                pos.y += cos(zOffset * 0.05 + uTime * 0.2) * 0.1;
                
                // ===== RING ASSEMBLY EFFECT =====
                vec3 assemblyTarget = aRingPosition;
                
                float assemblyFactor = uAssemblyProgress;
                if (assemblyFactor > 0.0) {
                    float t = smoothstep(0.0, 1.0, assemblyFactor);
                    
                    // Current position in ring shape
                    float currentAngle = atan(pos.y, pos.x);
                    float currentRadius = length(pos.xy);
                    float targetRadius = length(assemblyTarget.xy);
                    
                    // Interpolate toward ring position
                    float newAngle = mix(currentAngle, atan(assemblyTarget.y, assemblyTarget.x), t * 0.8);
                    float newRadius = mix(currentRadius, targetRadius, t * 0.8);
                    
                    pos.x = cos(newAngle) * newRadius;
                    pos.y = sin(newAngle) * newRadius;
                    pos.z = mix(pos.z, assemblyTarget.z + sin(uTime * 2.0 + aOffset * PI * 2.0) * 0.2, t * 0.6);
                    
                    // Add swirling motion during assembly
                    pos.x += sin(uTime * 4.0 + aOffset * PI * 4.0) * (1.0 - t) * 0.4;
                    pos.y += cos(uTime * 4.0 + aOffset * PI * 4.0) * (1.0 - t) * 0.4;
                }
                
                // Calculate final position
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                
                // Distance-based fade
                float distanceFade = 1.0 - smoothstep(30.0, 100.0, -mvPosition.z);
                vAlpha = distanceFade * (0.2 + tornadoFactor * 0.5 + assemblyFactor * 0.5);
                vDistance = -mvPosition.z;
                vAssembly = assemblyFactor;
                
                // Dynamic particle size
                float sizeMult = 1.0 + tornadoFactor * 1.0 + (1.0 - smoothstep(0.0, 0.4, assemblyFactor)) * sin(uTime * 5.0 + aOffset * PI * 2.0) * 0.4;
                gl_PointSize = aSize * (250.0 / -mvPosition.z) * sizeMult;
                
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const particleFragmentShader = `
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            
            varying float vAlpha;
            varying float vDistance;
            varying float vAssembly;
            
            void main() {
                // Create circular particle
                float dist = length(gl_PointCoord - vec2(0.5));
                if (dist > 0.5) discard;
                
                // Soft glow
                float glow = 1.0 - dist * 2.0;
                glow = pow(glow, 1.5);
                
                // Color gradient based on distance
                float colorMix = smoothstep(20.0, 80.0, vDistance);
                vec3 color = mix(uColor1, uColor2, colorMix);
                
                // Add orange during assembly
                color = mix(color, uColor3, vAssembly * 0.5);
                
                // Sparkle effect
                float sparkle = pow(glow, 4.0) * (0.4 + vAssembly * 0.6);
                
                gl_FragColor = vec4(color + sparkle * 0.25, vAlpha * glow);
            }
        `;
        
        // ============================================
        // INITIALIZE SCENE
        // ============================================
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.background);
            scene.fog = new THREE.Fog(CONFIG.colors.background, 40, 120);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 60);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);
            
            // Lights
            setupLights();
            
            // Create particles
            createParticles();
            
            // Create ring
            createRing();
            
            // Post-processing
            setupPostProcessing();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            
            // Initialize GSAP ScrollTrigger
            initScrollTrigger();
            
            // Hide loader
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 1500);
        }
        
        // ============================================
        // SETUP LIGHTS
        // ============================================
        function setupLights() {
            // Ambient light
            const ambient = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambient);
            
            // Main gold light
            const mainLight = new THREE.PointLight(CONFIG.colors.goldLight, 150, 100);
            mainLight.position.set(0, 0, 50);
            scene.add(mainLight);
            
            // Secondary gold light
            const secondaryLight = new THREE.PointLight(CONFIG.colors.gold, 80, 80);
            secondaryLight.position.set(0, 0, -50);
            scene.add(secondaryLight);
            
            // Accent lights
            const accentLight1 = new THREE.PointLight(0xFFA500, 40, 30);
            accentLight1.position.set(8, 4, 20);
            scene.add(accentLight1);
            
            const accentLight2 = new THREE.PointLight(0xFF8C00, 30, 25);
            accentLight2.position.set(-8, -4, -20);
            scene.add(accentLight2);
        }
        
        // ============================================
        // CREATE PARTICLES
        // ============================================
        function createParticles() {
            const count = CONFIG.particleCount;
            
            // Geometry
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const offsets = new Float32Array(count);
            const speeds = new Float32Array(count);
            const ringPositions = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                // Random position in tunnel
                const angle = Math.random() * Math.PI * 2;
                const radius = 2 + Math.random() * CONFIG.tunnelRadius;
                const z = (Math.random() - 0.5) * CONFIG.tunnelLength;
                
                positions[i * 3] = Math.cos(angle) * radius;
                positions[i * 3 + 1] = Math.sin(angle) * radius;
                positions[i * 3 + 2] = z;
                
                // Ring position for assembly
                const ringAngle = Math.random() * Math.PI * 2;
                const ringR = CONFIG.ringRadius + (Math.random() - 0.5) * CONFIG.ringTube * 2;
                const ringZ = (Math.random() - 0.5) * CONFIG.ringTube;
                
                ringPositions[i * 3] = Math.cos(ringAngle) * ringR;
                ringPositions[i * 3 + 1] = Math.sin(ringAngle) * ringR;
                ringPositions[i * 3 + 2] = ringZ;
                
                // Attributes
                sizes[i] = 0.02 + Math.random() * 0.08;
                offsets[i] = Math.random();
                speeds[i] = 0.2 + Math.random() * 1.0;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 1));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
            geometry.setAttribute('aRingPosition', new THREE.BufferAttribute(ringPositions, 3));
            
            // Material
            const material = new THREE.ShaderMaterial({
                vertexShader: particleVertexShader,
                fragmentShader: particleFragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uScrollProgress: { value: 0 },
                    uTornadoIntensity: { value: 1.0 },
                    uAssemblyProgress: { value: 0 },
                    uColor1: { value: new THREE.Color(CONFIG.colors.goldLight) },
                    uColor2: { value: new THREE.Color(CONFIG.colors.gold) },
                    uColor3: { value: new THREE.Color(0xFFA500) }
                },
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }
        
        // ============================================
        // CREATE RING
        // ============================================
        function createRing() {
            // Torus geometry
            const geometry = new THREE.TorusGeometry(
                CONFIG.ringRadius,
                CONFIG.ringTube,
                64,
                128
            );
            
            // Physical material for realistic gold
            const material = new THREE.MeshPhysicalMaterial({
                color: CONFIG.colors.gold,
                metalness: 1.0,
                roughness: 0.08,
                envMapIntensity: 3,
                clearcoat: 0.5,
                clearcoatRoughness: 0.1,
                reflectivity: 1
            });
            
            ring = new THREE.Mesh(geometry, material);
            ring.rotation.x = Math.PI / 2;
            ring.position.set(0, 0, -40);
            ring.scale.set(0, 0, 0);
            ring.visible = false;
            
            scene.add(ring);
            
            // Ring glow light
            const ringLight = new THREE.PointLight(CONFIG.colors.goldLight, 80, 25);
            ringLight.position.set(0, 0, 3);
            ring.add(ringLight);
        }
        
        // ============================================
        // POST-PROCESSING
        // ============================================
        function setupPostProcessing() {
            composer = new EffectComposer(renderer);
            
            // Render pass
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);
            
            // Bloom pass for golden glow
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                2.0,   // strength
                0.8,   // radius
                0.2    // threshold
            );
            composer.addPass(bloomPass);
            
            // Output pass
            const outputPass = new OutputPass();
            composer.addPass(outputPass);
        }
        
        // ============================================
        // SCROLL TRIGGER ANIMATION
        // ============================================
        function initScrollTrigger() {
            gsap.registerPlugin(ScrollTrigger);
            
            // Main scroll timeline
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: '#scroll-container',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: 1.5,
                    onUpdate: (self) => {
                        scrollProgress = self.progress;
                        updateProgressBar(self.progress);
                    }
                }
            });
            
            // Phase 1: Initial tornado effect (0-15%)
            tl.to(particles.material.uniforms.uTornadoIntensity, {
                value: 0,
                duration: 1
            }, 0);
            
            // Phase 2: Camera moves forward (10-50%)
            tl.to(camera.position, {
                z: -20,
                duration: 2,
                ease: 'power2.inOut'
            }, 0.1);
            
            // Phase 3: Particles assemble into ring (40-70%)
            tl.to(particles.material.uniforms.uAssemblyProgress, {
                value: 1,
                duration: 1.5,
                ease: 'power2.inOut'
            }, 0.4);
            
            // Phase 4: Ring appears (60-75%)
            tl.to(ring.scale, {
                x: 1,
                y: 1,
                z: 1,
                duration: 0.8,
                ease: 'back.out(1.5)'
            }, 0.6);
            
            tl.set(ring, { visible: true }, 0.6);
            
            // Phase 5: Ring rotates and camera approaches (70-90%)
            tl.to(camera.position, {
                z: -30,
                duration: 1,
                ease: 'power2.inOut'
            }, 0.7);
            
            // Independent camera sway animation
            gsap.to(camera.position, {
                x: '+=0.5',
                y: '+=0.3',
                duration: 3,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
            
            // Brand text reveal (75-85%)
            tl.to(brandContainer, {
                opacity: 1,
                duration: 1,
                ease: 'power2.out'
            }, 0.75);
            
            // Hide scroll indicator
            tl.to(scrollIndicator, {
                opacity: 0,
                duration: 0.5
            }, 0);
            
            // Show navigation (85-95%)
            tl.to(navContainer, {
                opacity: 1,
                pointerEvents: 'auto',
                duration: 1,
                ease: 'power2.out'
            }, 0.85);
            
            tl.to(progressBar, {
                opacity: 1,
                duration: 0.5
            }, 0.85);
            
            // Ring continuous rotation
            gsap.to(ring.rotation, {
                z: Math.PI * 2,
                x: Math.PI / 2 + Math.PI,
                duration: 8,
                repeat: -1,
                ease: 'none'
            });
        }
        
        // ============================================
        // UPDATE PROGRESS BAR
        // ============================================
        function updateProgressBar(progress) {
            const percentage = Math.round(progress * 100);
            progressFill.style.height = percentage + '%';
            progressText.textContent = percentage + '%';
        }
        
        // ============================================
        // ANIMATION LOOP
        // ============================================
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            
            // Update particle uniforms
            if (particles) {
                particles.material.uniforms.uTime.value = time;
                particles.material.uniforms.uScrollProgress.value = scrollProgress;
                
                // Subtle rotation
                particles.rotation.z = scrollProgress * Math.PI * 0.2;
            }
            
            // Ring floating animation
            if (ring && ring.visible) {
                ring.position.y = Math.sin(time * 0.5) * 0.1;
            }
            
            // Render
            composer.render();
        }
        
        // ============================================
        // WINDOW RESIZE
        // ============================================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ============================================
        // START
        // ============================================
        init();
        animate();
    </script>
</body>
</html>
